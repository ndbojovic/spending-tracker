<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RSD Tracker</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
<link rel="apple-touch-icon" href="icon.jpg">  
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">    
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #6366f1;
            --secondary: #10b981;
            --info: #0ea5e9;
            --text: #1e293b;
            --accent: #f1f5f9;
            --danger: #ef4444;
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; line-height: 1.5; }
        .container { max-width: 1100px; margin: 0 auto; }

        .dashboard-header { display: flex; flex-direction: column; gap: 20px; margin-bottom: 24px; }
        .card { background: var(--card); padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #e2e8f0; margin-bottom: 20px; }

        /* Histogram */
        .chart-container { display: flex; align-items: flex-end; justify-content: space-between; gap: 4px; height: 150px; padding-top: 30px; width: 100%; }
        .bar-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; justify-content: flex-end; }
        .bar { width: 80%; background: var(--primary); border-radius: 4px 4px 0 0; min-height: 2px; transition: height 0.5s ease; position: relative; }
        .bar:hover::after { content: attr(data-label); position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 4px 8px; border-radius: 6px; font-size: 10px; white-space: nowrap; z-index: 20; }
        .month-label { font-size: 10px; color: #94a3b8; margin-top: 8px; font-weight: 700; text-transform: uppercase; }

        .total-display { font-size: 2.5rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
        .grid { display: flex; flex-direction: column; gap: 20px; }

        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 16px; box-sizing: border-box; }

        .btn { border: none; padding: 14px; border-radius: 10px; cursor: pointer; font-weight: 600; width: 100%; display: block; text-align: center; margin-bottom: 8px; font-size: 0.9rem; transition: opacity 0.2s; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-info { background: var(--info); color: white; }
        .btn-outline { background: white; border: 1px solid #e2e8f0; color: #64748b; }
        .btn-danger { background: #fff1f2; border: 1px solid #fecaca; color: var(--danger); font-size: 0.8rem; margin-top: 15px; }

        .tag-row { display: flex; gap: 5px; margin-top: 4px; }
        .tag { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
        .tag-cat { background: var(--accent); color: #475569; }
        .tag-loc { background: #e0f2fe; color: #0369a1; }

        @media (min-width: 850px) {
            .dashboard-header { flex-direction: row; }
            .dashboard-header > div:first-child { flex: 1; }
            .dashboard-header > div:last-child { flex: 2; }
            .grid { display: grid; grid-template-columns: 350px 1fr; }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="dashboard-header">
        <div class="card" style="text-align:center; display:flex; flex-direction:column; justify-content:center;">
            <p style="margin:0; color:#64748b; font-weight:500;">Ukupna Potrošnja</p>
            <div id="total-amount" class="total-display">0 RSD</div>
        </div>
        <div class="card">
            <h2 style="margin:0; font-size:1rem; color:#475569;">Mesečni Trend (2026)</h2>
            <div class="chart-container" id="monthly-chart"></div>
        </div>
    </header>

    <div class="grid">
        <aside>
            <section class="card">
                <h2 style="font-size:1.1rem; margin-top:0;">Novi Unos</h2>
                <form id="expense-form">
                    <input type="text" id="description" placeholder="Šta ste platili?" required>
                    <input type="number" id="amount" step="1" placeholder="Iznos RSD" required>
                    <input type="date" id="expense-date" required>
                    <select id="category-select"></select>
                    <select id="location-select"></select>
                    <button type="submit" class="btn btn-primary">Sačuvaj</button>
                </form>
            </section>

            <section class="card">
                <h2 style="font-size:1rem; margin-top:0;">Upravljanje Kategorijama</h2>
                <textarea id="category-list" rows="8"></textarea>
                <button onclick="saveCategories()" class="btn btn-secondary">Ažuriraj Liste</button>
            </section>

            <section class="card">
                <h2 style="font-size:1rem; margin-top:0;">Upravljanje Lokacijama</h2>
                <textarea id="location-list" rows="4"></textarea>
                <button onclick="saveLocations()" class="btn btn-info">Ažuriraj Lokacije</button>
            </section>

            <section class="card">
                <button onclick="exportData()" class="btn btn-outline">Izvezi JSON</button>
                <button onclick="document.getElementById('import-input').click()" class="btn btn-outline">Uvezi Backup</button>
                <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
                <button onclick="clearData()" class="btn btn-danger">Obriši Sve Podatke</button>
            </section>
        </aside>

        <main>
            <section class="card">
                <h2 style="font-size:1.1rem; margin-top:0;">Po Kategorijama</h2>
                <div id="category-breakdown"></div>
            </section>

            <section class="card">
                <h2 style="font-size:1.1rem; margin-top:0;">Po Lokacijama</h2>
                <div id="location-breakdown"></div>
            </section>

            <section class="card">
                <h2 style="font-size:1.1rem; margin-top:0;">Istorija</h2>
                <div id="expense-history"></div>
            </section>
        </main>
    </div>
</div>

<script>
    // 20 DEFAULT SERBIAN CATEGORIES
    const defaultCategories = [
        "Infostan", "Porezi", "Osiguranje", "EPS Struja", "Voda", "Gas", "Internet", "Mobilni", "TV", "Hrana i namirnice", "Pijaca", "Restoran i kafić", "Higijena i kućna hemija", 
        "Gorivo", "Održavanje Auta", "Registracija i Osiguranje",
        "Garderoba", "Lekovi", "Doktori", "Zubar",
        "Kursevi", "Knjige", "Sofware", "Hosting",
        "Sport", "Pokloni",
        "Namestaj", "Uredjaji", "Popravke", "Renoviranje", "Basta/Voćnjak",
        "Alat i Radionica", "Popravke u kući",
        "Hobi"
    ];

    // 7 DEFAULT LOCATIONS
    const defaultLocations = [
        "Beograd", 
        "Online - Domaće", "Online - Inostranstvo"
    ];

    let expenses = JSON.parse(localStorage.getItem('vibe_expenses')) || [];
    let categories = JSON.parse(localStorage.getItem('vibe_categories')) || defaultCategories;
    let locations = JSON.parse(localStorage.getItem('vibe_locations')) || defaultLocations;

    const monthNames = ["Jan", "Feb", "Mar", "Apr", "Maj", "Jun", "Jul", "Avg", "Sep", "Okt", "Nov", "Dec"];

    window.onload = () => {
        document.getElementById('expense-date').valueAsDate = new Date();
        renderLists();
        renderAll();
    };

    function renderAll() {
        expenses.sort((a, b) => new Date(b.date) - new Date(a.date));
        localStorage.setItem('vibe_expenses', JSON.stringify(expenses));
        localStorage.setItem('vibe_categories', JSON.stringify(categories));
        localStorage.setItem('vibe_locations', JSON.stringify(locations));
        renderExpenses();
        renderBreakdown('cat', categories, 'category-breakdown');
        renderBreakdown('loc', locations, 'location-breakdown');
        renderHistogram();
    }

    function renderHistogram() {
        const chart = document.getElementById('monthly-chart');
        const currentYear = new Date().getFullYear();
        const monthlyTotals = new Array(12).fill(0);
        expenses.forEach(ex => {
            const d = new Date(ex.date);
            if (d.getFullYear() === currentYear) monthlyTotals[d.getMonth()] += ex.amt;
        });
        const maxSpend = Math.max(...monthlyTotals) || 1;
        chart.innerHTML = monthlyTotals.map((total, i) => {
            const height = (total / maxSpend) * 100;
            return `<div class="bar-wrapper"><div class="bar" style="height: ${height}%" data-label="${total.toLocaleString('sr-RS')} RSD"></div><div class="month-label">${monthNames[i]}</div></div>`;
        }).join('');
    }

    function renderBreakdown(field, list, targetId) {
        const div = document.getElementById(targetId);
        let grand = 0; const totals = {};
        list.forEach(item => totals[item] = 0);
        expenses.forEach(ex => {
            const val = ex[field];
            if(totals[val] !== undefined) totals[val] += ex.amt;
            else totals["Ostalo"] = (totals["Ostalo"] || 0) + ex.amt;
            grand += ex.amt;
        });
        const sorted = Object.entries(totals).sort((a, b) => b[1] - a[1]);
        div.innerHTML = sorted.map(([name, amt]) => {
            if (amt === 0) return '';
            const p = grand > 0 ? ((amt/grand)*100).toFixed(0) : 0;
            return `<div style="display:flex; justify-content:space-between; font-size:0.9rem; margin-top:10px;"><span>${name}</span><span>${amt.toLocaleString('sr-RS')} RSD</span></div><div style="background:#eee; height:6px; border-radius:3px; margin-top:4px;"><div style="background:var(--primary); width:${p}%; height:100%; border-radius:3px;"></div></div>`;
        }).join('') || '<p style="color:#94a3b8">Nema podataka.</p>';
    }

    function renderExpenses() {
        const cont = document.getElementById('expense-history');
        const disp = document.getElementById('total-amount');
        let total = 0;
        cont.innerHTML = expenses.map(ex => {
            total += ex.amt;
            return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #f1f5f9;">
                    <div style="font-size:0.9rem;"><span style="color:#94a3b8; font-size:0.75rem;">${ex.date}</span><br><strong>${ex.desc}</strong>
                    <div class="tag-row"><span class="tag tag-cat">${ex.cat}</span><span class="tag tag-loc">${ex.loc}</span></div></div>
                    <div style="text-align:right"><strong>${ex.amt.toLocaleString('sr-RS')}</strong></div></div>`;
        }).join('');
        disp.innerText = total.toLocaleString('sr-RS') + ' RSD';
    }

    document.getElementById('expense-form').onsubmit = (e) => {
        e.preventDefault();
        const amt = parseFloat(document.getElementById('amount').value);
        if (isNaN(amt)) return;
        expenses.push({ id: Date.now(), desc: document.getElementById('description').value, amt: amt, cat: document.getElementById('category-select').value, loc: document.getElementById('location-select').value, date: document.getElementById('expense-date').value });
        e.target.reset();
        document.getElementById('expense-date').valueAsDate = new Date();
        renderAll();
    };

    function renderLists() {
        document.getElementById('category-select').innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        document.getElementById('category-list').value = categories.join('\n');
        document.getElementById('location-select').innerHTML = locations.map(l => `<option value="${l}">${l}</option>`).join('');
        document.getElementById('location-list').value = locations.join('\n');
    }

    function saveCategories() {
        categories = document.getElementById('category-list').value.split('\n').filter(c => c.trim());
        renderLists(); renderAll();
    }

    function saveLocations() {
        locations = document.getElementById('location-list').value.split('\n').filter(l => l.trim());
        renderLists(); renderAll();
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({ expenses, categories, locations }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `budzet-backup-${new Date().toISOString().slice(0,10)}.json`;
        a.click();
    }

    function importData(event) {
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                expenses = imported.expenses || [];
                categories = imported.categories || defaultCategories;
                locations = imported.locations || defaultLocations;
                renderLists(); renderAll();
            } catch (err) { alert("Greška pri uvozu."); }
        };
        reader.readAsText(event.target.files[0]);
    }

    function clearData() {
        if(confirm("Obriši sve podatke?")) { localStorage.clear(); window.location.reload(); }
    }
</script>
</body>
</html>
